name: Claude Autonomous Build

on:
  pull_request:
    types: [closed]        # you merged → next ticket
  issue_comment:
    types: [created]       # you left feedback → iterate
  workflow_dispatch:       # manual trigger → next ticket

permissions:
  contents: write
  pull-requests: write

jobs:
  next-ticket:
    # Only trigger on Claude's PRs, not all PRs
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'claude-built'))
      ||
      (github.event_name == 'issue_comment')
      ||
      (github.event_name == 'workflow_dispatch')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to PR branch (on issue comment)
        if: github.event_name == 'issue_comment'
        run: |
          branch=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.ref')
          git checkout $branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
      - run: npm ci
      - run: npm install -g @anthropic-ai/claude-code

      - name: Print available skills
        run: |
          claude --dangerously-skip-permissions --model claude-sonnet-4-6 --print "List all skills and commands available to you in this project, including any in .claude/skills/."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.AUTO_CLAUDE_ANTROPIC_API_KEY }}

      # Flow 1: PR merged or manual trigger → pick next ticket
      - name: Start next ticket
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
          claude --dangerously-skip-permissions --model claude-sonnet-4-6 --print "The last PR was merged. Pick the next open
          issue labeled claude-todo and build it end to end per CLAUDE.md."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.AUTO_CLAUDE_ANTROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AUTO_CLAUDE_GITHUB_PERSONAL_ACCESS_TOKEN }}

      # Flow 2: Comment left → address feedback
      - name: Address PR feedback
        if: github.event_name == 'issue_comment'
        run: |
          claude --dangerously-skip-permissions --model claude-sonnet-4-6 --print "A reviewer left this feedback:
          '${{ github.event.comment.body }}'
          Address it and push fixes to the same branch."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.AUTO_CLAUDE_ANTROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.AUTO_CLAUDE_GITHUB_PERSONAL_ACCESS_TOKEN }}
